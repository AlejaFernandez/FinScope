services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "4200:4200"
      - "4000:4000"
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
    command: ng serve --host 0.0.0.0 --poll 2000
    stdin_open: true
    tty: true

volumes:
  node_modules:
